name: PyInstaller Build

permissions:
  contents: write

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:

jobs:
  build-windows:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v3
      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.10'
      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install pyinstaller todoist-api-python python-dotenv
      - name: Build executable
        run: |
          pyinstaller --onefile --name todoist_sync todoist_to_obsidian_context_synchronization.py
      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: todoist_sync-windows
          path: dist/todoist_sync.exe

  build-linux:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'
      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install pyinstaller todoist-api-python python-dotenv
      - name: Build executable
        run: |
          pyinstaller --onefile --name todoist_sync todoist_to_obsidian_context_synchronization.py
      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: todoist_sync-linux
          path: dist/todoist_sync

  release:
    needs: [build-windows, build-linux]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Download Windows artifact
        uses: actions/download-artifact@v4
        with:
          name: todoist_sync-windows
          path: artifacts/windows

      - name: Download Linux artifact
        uses: actions/download-artifact@v4
        with:
          name: todoist_sync-linux
          path: artifacts/linux

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: |
            artifacts/windows/todoist_sync.exe
            artifacts/linux/todoist_sync
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}